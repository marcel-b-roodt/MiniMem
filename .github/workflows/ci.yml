name: CI — Library Build & Test

on:
  push:
    branches: [main]
    paths:
      - 'src/lib/**'
      - 'tests/lib/**'
      - 'meson.build'
      - 'meson_options.txt'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/lib/**'
      - 'tests/lib/**'
      - 'meson.build'
      - 'meson_options.txt'
      - '.github/workflows/ci.yml'

permissions:
  contents: read

jobs:
  build-and-test:
    name: "libminimem (${{ matrix.os }}, gcc-${{ matrix.gcc_version }})"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04]
        gcc_version: ['14']
        include:
          - os: ubuntu-22.04
            gcc_version: '12'

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            meson \
            ninja-build \
            pkg-config \
            libzstd-dev \
            cmake \
            gcc-${{ matrix.gcc_version }} \
            g++-${{ matrix.gcc_version }}

      - name: Install Criterion
        run: |
          curl -fsSL https://github.com/Snaipe/Criterion/releases/download/v2.4.3/criterion-2.4.3.tar.xz -o /tmp/criterion.tar.xz
          tar -xf /tmp/criterion.tar.xz -C /tmp
          cd /tmp/criterion-2.4.3
          meson setup build -Dprefix=/usr -Dbuildtype=release
          ninja -C build
          sudo ninja -C build install
          sudo ldconfig

      - name: Configure
        run: |
          CC=gcc-${{ matrix.gcc_version }} CXX=g++-${{ matrix.gcc_version }} \
            meson setup build -Dtests=true

      - name: Build
        run: meson compile -C build

      - name: Test
        run: meson test -C build --print-errorlogs

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.os }}-gcc${{ matrix.gcc_version }}
          path: build/meson-logs/
          retention-days: 7

  build-no-criterion:
    name: "libminimem (no Criterion, tests disabled)"
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            meson \
            ninja-build \
            pkg-config \
            libzstd-dev

      - name: Configure (tests disabled)
        run: meson setup build -Dtests=false

      - name: Build
        run: meson compile -C build

      - name: Verify shared library
        run: |
          shopt -s nullglob
          libs=(build/libminimem.so build/libminimem.so.*)
          if [ ${#libs[@]} -gt 0 ]; then
            echo "Shared library OK"
            ls -la "${libs[@]}"
          else
            echo "Shared library not found"
            exit 1
          fi

      - name: Verify static library
        run: |
          if [ -f build/libminimem_static.a ]; then
            echo "Static library OK"
          else
            echo "Static library not found"
            exit 1
          fi

  lint-scripts:
    name: "Shell script lint"
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Lint shell scripts
        run: |
          # shellcheck source=ignore to avoid false positives on sourced scripts
          # SC2015: A && B || C is intentional in test assertions (ok/fail always return 0)
          # SC2034: unused variables may be used externally or in eval context
          # SC2126: grep -c is used where appropriate but wc -l is clearer for counting matches
          find . -name '*.sh' \
            -not -path './.vm-test/*' \
            -not -path './subprojects/*' \
            -not -name 'collect_page_dumps.sh' \
            | xargs shellcheck -s bash -S style \
                -e SC1090 -e SC1091 -e SC2086 -e SC2046 \
                -e SC2015 -e SC2034 -e SC2126