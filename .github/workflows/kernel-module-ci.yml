name: CI — Kernel Module Build

on:
  push:
    branches: [main]
    paths:
      - 'src/kernel/**'
      - 'patches/**'
      - 'dkms/**'
      - 'build-kmod.sh'
      - '.github/workflows/kernel-module-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/kernel/**'
      - 'patches/**'
      - 'dkms/**'
      - 'build-kmod.sh'
      - '.github/workflows/kernel-module-ci.yml'

permissions:
  contents: read

jobs:
  build-kmod:
    name: "minimem.ko (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-22.04]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install kernel headers
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            linux-headers-$(uname -r) \
            make \
            gcc

      - name: Build kernel module
        run: bash build-kmod.sh build 2>&1

      - name: Verify module
        run: |
          if [ -f src/kernel/minimem.ko ]; then
            file src/kernel/minimem.ko
            modinfo src/kernel/minimem.ko || true
            echo "Module build SUCCESS on $(uname -r)"
          else
            echo "Module build FAILED — minimem.ko not found"
            exit 1
          fi

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: kmod-build-logs-${{ matrix.os }}
          retention-days: 7